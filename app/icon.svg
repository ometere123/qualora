<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e0d6e"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="qg" x1="0.2" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#ddd6fe"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <rect width="200" height="200" rx="44" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.5"/>

  <!-- Hex ring r=82, center 100,100 -->
  <polygon points="182,100 141,171.1 59,171.1 18,100 59,28.9 141,28.9"
           fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.35"/>

  <!-- Connector lines -->
  <line x1="182" y1="100" x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <line x1="141" y1="171" x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <line x1="59"  y1="171" x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <line x1="18"  y1="100" x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <line x1="59"  y1="29"  x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <line x1="141" y1="29"  x2="100" y2="100" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>

  <!-- Validator nodes -->
  <circle cx="182" cy="100" r="4.5" fill="url(#ng)"/>
  <circle cx="141" cy="171" r="4.5" fill="url(#ng)"/>
  <circle cx="59"  cy="171" r="4.5" fill="url(#ng)"/>
  <circle cx="18"  cy="100" r="4.5" fill="url(#ng)"/>
  <circle cx="59"  cy="29"  r="4.5" fill="url(#ng)"/>
  <circle cx="141" cy="29"  r="4.5" fill="url(#ng)"/>

  <!-- Q: center 97,95 r=42 -->
  <!-- 5 o'clock (60°): 97+42*0.5=118, 95+42*0.866=131.4 -->
  <!-- 7 o'clock (120°): 97-21=76, 95+36.4=131.4 -->
  <path d="M 118 131.4 A 42 42 0 1 0 76 131.4"
        fill="none" stroke="url(#qg)" stroke-width="13" stroke-linecap="round"/>

  <!-- Q tail -->
  <line x1="118" y1="131.4" x2="148" y2="163"
        stroke="url(#qg)" stroke-width="13" stroke-linecap="round"/>
</svg>
